# Builds, lints, and tests the project across multiple operating systems and
# Node.js versions. See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
name: CI
on:
    push:
        branches: ["master", "dev"]
        paths-ignore:
            - "**.md"
    pull_request:
        branches: ["master", "dev"]
        paths-ignore:
            - "**.md"
    workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    # Lint, format check and type-check/build once on Linux.
    quality:
        name: lint & build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"
            - run: npm ci
            - name: Lint
              run: npm run lint
            - name: Check formatting
              run: npx prettier --check ./src
            - name: Build
              run: npm run build

    # Build + unit tests across operating systems and Node versions.
    # Unit tests use the in-memory/mocked drivers, so they run without any
    # external services and validate cross-platform behaviour (incl. the
    # native better-sqlite3 build).
    unit:
        name: unit (${{ matrix.os }}, node ${{ matrix.node-version }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                node-version: [22.x, 24.x]
        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - run: npm run build
            - run: npm run test:unit

    # Integration tests need real databases (MySQL, MongoDB, Postgres,
    # Cassandra). Service containers / docker compose are only supported on
    # Linux runners, so this job is Linux-only by design.
    integration:
        name: integration (node ${{ matrix.node-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: [22.x, 24.x]
        steps:
            - uses: actions/checkout@v4
            - name: Start databases
              run: docker compose -f docker-compose.yml --env-file .env.dev up -d
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - run: npm run test:integration
            - name: Stop databases
              if: always()
              run: docker compose -f docker-compose.yml --env-file .env.dev down -v

    # Unit tests for the Bun-only drivers (BunSqliteDriver, BunSQLDriver).
    # These exercise bun:sqlite and Bun.sql's in-memory SQLite adapter, so they
    # need no external services. Runs under the Bun runtime.
    bun-unit:
        name: bun unit (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v4
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --ignore-scripts
            - run: bun run test:bun

    # Integration tests for BunSQLDriver against real Postgres and MySQL,
    # driven by Bun.sql. Linux-only, like the Node integration job, because the
    # database service containers require docker compose.
    bun-integration:
        name: bun integration
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Start databases
              run: docker compose -f docker-compose.yml --env-file .env.dev up -d
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --ignore-scripts
            - run: bun run test:bun:integration
            - name: Stop databases
              if: always()
              run: docker compose -f docker-compose.yml --env-file .env.dev down -v
